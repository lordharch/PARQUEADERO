<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Registro - Parkin P.B</title>
  <link rel="stylesheet" href="css/styles.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
</head>
<body>
  <header>
    <nav class="navbar">
      <div class="logo">
        <img src="img/logo.png" alt="Logo Parkin P.B" class="logo-img" />
        <span>PARKIN P.B</span>
      </div>
      
      <div class="menu-toggle">
        <i class="fas fa-bars"></i>
      </div>
      
      <ul class="nav-links" id="menuLinks">
        <li><a href="index.html">Inicio</a></li>
        <li><a href="index.html#quienes-somos">Quienes somos</a></li>
        <li><a href="index.html#ubicacion">Ubicación</a></li>
        <li><a href="login.html">Iniciar Sesión</a></li>
        <li><a href="registro.html" class="active">Registrarme</a></li>
        <li><a href="index.html#contacto">Contáctenos</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <div class="auth-container">
      <h2>Crear Cuenta</h2>
      <form id="registroForm" class="auth-form">

         <div class="form-group">
    <label for="identificacion">Identificación</label>
    <input type="text" id="identificacion" name="identificacion" placeholder="Ej: 123456789" required>
        </div>

        <div class="form-group">
          <label for="nombre_completo">Nombre completo</label>
          <input type="text" id="nombre_completo" name="nombre_completo" placeholder="Ej: Juan Pérez" required>
        </div>

        <div class="form-group">
          <label for="correo">Correo electrónico</label>
          <input type="email" id="correo" name="correo" placeholder="Ej: correo@ejemplo.com" required>
        </div>

        <div class="form-group">
          <label for="telefono">Teléfono</label>
          <input type="text" id="telefono" name="telefono" placeholder="Ej: 3123456789" required>
        </div>

        <div class="form-group">
          <label for="id_tipo_usuario">Tipo de Usuario</label>
          <select id="id_tipo_usuario" name="id_tipo_usuario" required>
            <option value="">Seleccione</option>
            <option value="1">Premium</option>
            <option value="2">Cliente</option>
            <!-- Agrega más según los datos reales en tu tabla TipoUsuario -->
          </select>
        </div>
        <!-- Agregar estos campos -->
        <div class="form-group">
          <label for="marca">Marca del Vehículo</label>
          <input type="text" id="marca" name="marca" required>
        </div>

        <div class="form-group">
          <label for="modelo">Modelo</label>
          <input type="text" id="modelo" name="modelo" required>
        </div>

        <div class="form-group">
          <label for="color">Color</label>
          <input type="text" id="color" name="color" required>
        </div>

        <div class="form-group">
          <label for="id_tipo_vehiculo">Tipo de Vehículo</label>
          <select id="id_tipo_vehiculo" name="id_tipo_vehiculo" required>
            <option value="">Seleccione</option>
            <!-- Poblar desde tabla TipoVehiculo -->
          </select>
        </div>


        <button type="submit" class="auth-btn">Registrarme</button>
      </form>
      
      <div id="mensajeRegistro" class="auth-message"></div>
      
      <div class="auth-links">
        <p>¿Ya tienes una cuenta? <a href="login.html">Inicia sesión aquí</a></p>
      </div>
    </div>
  </main>

  <footer>
    <div class="footer-bottom">
      <p>© 2025 Parkin P.B | Todos los derechos reservados</p>
    </div>
  </footer>

  <script src="js/main.js"></script>
  <script>
    // Script básico para el menú responsive
    document.querySelector('.menu-toggle').addEventListener('click', function() {
      document.querySelector('.nav-links').classList.toggle('active');
    });
    
    // Cerrar el menú al hacer clic en un enlace (en móviles)
    const navLinks = document.querySelectorAll('.nav-links a');
    navLinks.forEach(link => {
      link.addEventListener('click', () => {
        document.querySelector('.nav-links').classList.remove('active');
      });
    });
  </script>
</body>
</html>
